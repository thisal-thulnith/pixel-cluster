<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Cluster</title>
<link rel="stylesheet" href="css/global.css">
<style>
body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  overflow: hidden;
}
.logo-wrapper {
  position: relative;
  z-index: 1;
  text-align: center;
  animation: pc-fadeUp 1s cubic-bezier(0.4, 0, 0.2, 1);
}
.logo-container {
  display: flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.logo-container:hover { transform: scale(1.06); }
.pixel {
  font-size: clamp(2.8rem, 8vw, 4.5rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: 5px;
  text-shadow: 0 0 40px rgba(255,255,255,0.08);
}
.dot {
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 4px;
  box-shadow: 0 0 25px var(--accent-glow), 0 0 50px rgba(229,9,20,0.2);
  animation: dot-pulse 2s ease-in-out infinite;
  margin: 0 4px;
}
@keyframes dot-pulse {
  0%, 100% { box-shadow: 0 0 25px var(--accent-glow); transform: scale(1); }
  50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 70px rgba(229,9,20,0.3); transform: scale(1.2); }
}
.cluster {
  font-size: clamp(2.8rem, 8vw, 4.5rem);
  font-weight: 900;
  letter-spacing: 5px;
  background: linear-gradient(135deg, var(--accent), #ff6b6b, var(--accent));
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: pc-shimmer 4s ease-in-out infinite;
}
.tagline {
  margin-top: 18px;
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  animation: pc-fadeUp 1s cubic-bezier(0.4,0,0.2,1) 0.3s both;
}
.enter-hint {
  margin-top: 50px;
  animation: pc-fadeUp 1s cubic-bezier(0.4,0,0.2,1) 0.5s both;
}
.enter-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 36px;
  background: var(--accent-soft);
  border: 1px solid rgba(229,9,20,0.25);
  border-radius: 999px;
  color: var(--accent);
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  transition: var(--transition);
  backdrop-filter: blur(10px);
}
.enter-btn:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 0 40px var(--accent-glow);
  transform: translateY(-3px);
}
.bottom-line {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  background-size: 200% 100%;
  animation: pc-glow-line 2.5s ease-in-out infinite;
}
</style>
</head>
<body onclick="goHome()">
<div class="pc-bg-glow"></div>
<div class="pc-grid-bg"></div>
<div class="logo-wrapper">
  <div class="logo-container">
    <span class="pixel">PIXEL</span>
    <span class="dot"></span>
    <span class="cluster">CLUSTER</span>
  </div>
  <div class="tagline">Where Stories, Screens & Sounds Collide</div>
  <div class="enter-hint">
    <a href="0.Home%20page%202.html" class="enter-btn" onclick="event.stopPropagation();">Enter &rarr;</a>
  </div>
</div>
<div class="bottom-line"></div>
<script>
function goHome() { window.location.href="0.Home%20page%202.html"; }
</script>
</body>
</html>
