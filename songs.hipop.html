<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Cluster | Hip Hop</title>
<link rel="stylesheet" href="global.css">
<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* -------- GLOBAL -------- */
body {
  margin: 0;
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* -------- NAVBAR -------- */
nav {
  background: var(--glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--glass-border);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

nav h1 {
  margin: 0;
  color: var(--text);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1.5px;
}

nav a {
  color: var(--text-secondary);
  text-decoration: none;
  margin-left: 20px;
  font-weight: 600;
  font-size: 15px;
  transition: var(--transition);
}

nav a:hover {
  color: var(--accent);
}

/* -------- HERO SECTION -------- */
.hero {
  height: 60vh;
  background-size: cover;
  background-position: center;
  position: relative;
  transition: background-image 1.5s ease-in-out;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(6,6,11,0.5), rgba(6,6,11,0.85));
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-overlay h2 {
  font-size: 42px;
  font-weight: 700;
  border: 2px solid var(--accent);
  padding: 18px 32px;
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius);
  color: var(--text);
  letter-spacing: 1px;
  box-shadow: 0 0 30px var(--accent-glow);
}

/* -------- SECTION TITLE -------- */
.section-title {
  text-align: center;
  margin-top: 48px;
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}

/* -------- SONG CONTAINER -------- */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  padding: 20px;
  gap: 8px;
}

/* -------- SONG CARD -------- */
.card {
  width: 220px;
  margin: 16px;
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
  border-color: rgba(229,9,20,0.2);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.08);
}

.card h3 {
  text-align: center;
  margin: 12px 0 5px 0;
  color: var(--text);
  font-size: 16px;
  font-weight: 600;
}

.card p {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* -------- FOOTER -------- */
footer {
  background: var(--bg-secondary);
  border-top: 1px solid var(--glass-border);
  text-align: center;
  padding: 18px;
  margin-top: 48px;
  color: var(--text-secondary);
  font-size: 14px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="pc-nav">

    </a>
    <div class="pc-nav-links">
        <a href="0.Home page 2.html"><i class="fas fa-home"></i> Home</a>
        <a href="1home.html"><i class="fas fa-film"></i> Movies</a>
        <a href="Songs Home page.html"><i class="fas fa-music"></i> Songs</a>
        <a href="1. Books Main.html"><i class="fas fa-book"></i> Library</a>
        <a href="MusicClassesMain.html"><i class="fas fa-guitar"></i> Music Classes</a>
        <a href="Index.html"><i class="fas fa-person-walking"></i> Dance</a>
        <a href="help.html"><i class="fas fa-circle-question"></i> Help</a>
    </div>
    <div class="pc-nav-right">
        <button class="pc-nav-toggle"><i class="fas fa-bars"></i></button>
    </div>
</nav>

<div class="pc-breadcrumb">
    <a href="0.Home page 2.html"><i class="fas fa-home"></i> Home</a>
    <span class="sep"><i class="fas fa-chevron-right"></i></span>

<!-- HERO SLIDESHOW SCRIPT -->
<script>

function startHeroSlideshow() {

  const images = [
    "hipopSlideshow1.jpg",
    "hipopSlideshow2.jpg",
    "hipopSlideshow3.jpg",
    "hipopSlideshow4.jpg"
  ];

  let index = 0;
  const hero = document.getElementById("hero");

  hero.style.backgroundImage = `url('${images[index]}')`;

  setInterval(() => {
    index = (index + 1) % images.length;
    hero.style.backgroundImage = `url('${images[index]}')`;
  }, 3000);
}

startHeroSlideshow();

</script>
