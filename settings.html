    <main class="content">
        <h2>Account Settings</h2>
<p>Select what you want to change.</p>

<div class="settings-buttons">
    <button onclick="showSetting('password')" class="button-Setting">Change Password</button>
    <button onclick="showSetting('email')" class="button-Setting">Change Email</button>
    <button onclick="showSetting('notifications')" class="button-Setting">Notification Settings</button>
    <button onclick="showSetting('privacy')" class="button-Setting">Privacy Settings</button>
</div>

<div id="settingBox"></div>

<script>

function showSetting(type){

    let content = "";

    if(type === "password"){
        content = `
        <h3>Change Password</h3>
        <input type="password" placeholder="Current Password"><br><br>
        <input type="password" placeholder="New Password"><br><br>
        <input type="password" placeholder="Confirm Password"><br><br>
        <button onclick="updatePassword()">Update Password</button>
        `;
    }

    else if(type === "email"){
        content = `
        <h3>Change Email</h3>
        <input type="email" placeholder="New Email"><br><br>
        <button onclick="updateEmail()">Update Email</button>
        `;
    }

    else if(type === "notifications"){
        content = `
        <h3>Notification Settings</h3>
        <input type="checkbox"> Email Notifications<br>
        <input type="checkbox"> SMS Notifications<br><br>
        <button onclick="saveNotifications()">Save Preferences</button>
        `;
    }

    else if(type === "privacy"){
        content = `
        <h3>Privacy Settings</h3>
        <input type="checkbox"> Make Profile Public<br>
        <input type="checkbox"> Show Booking History<br><br>
        <button onclick="savePrivacy()">Save Settings</button>
        `;
    }

    document.getElementById("settingBox").innerHTML = content;
}


// Confirm Functions

function updatePassword(){
    if(confirm("Are you sure you want to update your password?")){
        alert("Password Updated Successfully!");
    } else {
        alert("Password update cancelled.");
    }
}

function updateEmail(){
    if(confirm("Are you sure you want to update your email?")){
        alert("Email Updated Successfully!");
    } else {
        alert("Email update cancelled.");
    }
}

function saveNotifications(){
    if(confirm("Save notification settings?")){
        alert("Preferences Saved!");
    } else {
        alert("Operation cancelled.");
    }
}

function savePrivacy(){
    if(confirm("Save privacy settings?")){
        alert("Privacy Settings Saved!");
    } else {
        alert("Operation cancelled.");
    }
}

</script>
