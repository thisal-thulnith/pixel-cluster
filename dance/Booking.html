            <h1>Book Your Dance Class</h1>
        </div>


<main class="content">
<div class="booking-container">

<h2>Class Booking Form</h2>

<form>

<label>Full Name :</label>
<input type="text" placeholder="Enter your name" required>

<label>Email :</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number :</label>
<input type="tel" placeholder="Enter your phone number" required>

<label>Select Dance Style :</label>
<select required>
    <option value="">-- Select Dance Style --</option>
    <option>Sri Lankan Traditional Dance</option>
    <option>Ballroom Dance</option>
    <option>Bollywood Dance</option>
    <option>Contemporary Dance</option>
    <option>Hip Hop Dance</option>
    <option>K-pop Dance</option>
    <option>Modern Dance</option>
    <option>Tap Dance</option>
    <option>Salsa Dance</option>
</select>

<label>Select Teacher :</label>
<select required>
    <option value="">-- Select Teacher --</option>
    <option>Mr. Nimal Perera</option>
    <option>Ms. Dilini Fernando</option>
    <option>Mr. John Silva</option>
    <option>Ms. Riya Patel</option>
    <option>Ms. Kavindi</option>
    <option>Mr. Kevin</option>
    <option>Ms. Hana</option>
    <option>Mr. Ashen</option>
    <option>Ms. Linda</option>
    <option>Mr. Carlos</option>
</select>

<label>Preferred Date :</label>
<input type="date" required>

<label>Message (Optional) :</label>
<textarea placeholder="Any special request..."></textarea>

<button type="submit" class="book">📘 Confirm Booking</button>

</form>

</div>
